# Daily refresh — runs at 20:00 UTC (6am AEST next day)
# Triggers: scrapers, RAG ingest, signal evaluator, health check, RAGAS (Sundays)
name: Daily Refresh

on:
  schedule:
    # 20:00 UTC = 6am AEST next day
    - cron: "0 20 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  run-daily-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily refresh
        run: |
          API_URL="${{ vars.DAILY_REFRESH_URL }}"
          if [ -z "$API_URL" ]; then API_URL="https://forexmind-production.up.railway.app"; fi
          MAX_ATTEMPTS=3
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $i of $MAX_ATTEMPTS..."
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${API_URL}/run-daily-refresh" --max-time 300)
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "Response ($HTTP_CODE): $BODY"
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "Daily refresh completed successfully"
              exit 0
            fi
            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              echo "Retrying in 60s (429/5xx may be transient)..."
              sleep 60
            fi
          done
          echo "Daily refresh failed after $MAX_ATTEMPTS attempts"
          exit 1
