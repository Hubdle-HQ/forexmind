# Daily refresh — runs at 20:00 UTC (6am AEST next day)
# Triggers: scrapers, RAG ingest, signal evaluator, health check, RAGAS (Sundays)
name: Daily Refresh

on:
  schedule:
    # 20:00 UTC = 6am AEST next day
    - cron: "*/5 * * * *" # For testing: every 5 minutes
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  run-daily-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily refresh
        run: |
          API_URL="${{ vars.DAILY_REFRESH_URL }}"
          if [ -z "$API_URL" ]; then API_URL="https://forexmind-production.up.railway.app"; fi
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${API_URL}/run-daily-refresh")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Response ($HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Daily refresh completed successfully"
          else
            echo "Daily refresh failed with HTTP $HTTP_CODE"
            exit 1
          fi
